          else
            echo "| :yellow_circle: | auth0 | ${{ needs.plan-auth0.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-resque.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-resque.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | resque | No Changes |" >> $GITHUB_STEP_SUMMARY 
          else
