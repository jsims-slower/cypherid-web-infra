name: Manually Plan All
run-name: Manually Plan All in ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Both Github Environment and AWS Environment"
        required: true
        type: environment
        default: debug

permissions:
  id-token: write
  contents: read

# NOTE: We would use a matrix, but Outputs are not properly supported yet
jobs:
  plan-iam-password-policy:
    name: Plan - iam-password-policy
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: iam-password-policy
    secrets: inherit

  plan-params-secrets:
    name: Plan - params-secrets
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: params-secrets
    secrets: inherit

  #plan-route53:
  #  name: Plan - route53
  #  uses: ./.github/workflows/plan_component_call.yml
  #  with:
  #    environment: ${{ inputs.environment }}
  #    component: route53
  #  secrets: inherit

  plan-czid-services-private-key:
    name: Plan - czid-services-private-key
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: czid-services-private-key
    secrets: inherit

  plan-cloud-env:
    name: Plan - cloud-env
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: cloud-env
    secrets: inherit

  plan-idseq-s3-tar-writer:
    name: Plan - idseq-s3-tar-writer
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: idseq-s3-tar-writer
    secrets: inherit

  plan-elb-access-logs:
    name: Plan - elb-access-logs
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: elb-access-logs
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-maintenance:
    name: Plan - maintenance
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: maintenance
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-heatmap-optimization:
    name: Plan - heatmap-optimization
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: heatmap-optimization
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-db:
    name: Plan - db
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: db
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-downloads:
    name: Plan - downloads
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: downloads
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-ecs:
    name: Plan - ecs
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: ecs
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-batch:
    name: Plan - batch
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: batch
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-redis:
    name: Plan - redis
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: redis
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-web:
    name: Plan - web
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: web
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-web-waf:
    name: Plan - web-waf
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: web-waf
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-auth0:
    name: Plan - auth0
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: auth0
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-resque:
    name: Plan - resque
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: resque
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-eks:
    name: Plan - eks
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: eks
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-k8s-core:
    name: Plan - k8s-core
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: k8s-core
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-happy:
    name: Plan - happy
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: happy
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-access-management:
    name: Plan - access-management
    uses: ./.github/workflows/plan_component_call.yml
    with:
      environment: ${{ inputs.environment }}
      component: access-management
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  plan-summary:
    name: Plan Summary
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }} # Run even if upstream jobs fail
    needs:
      - plan-iam-password-policy
      - plan-params-secrets
      #- plan-route53
      - plan-czid-services-private-key
      - plan-cloud-env
      - plan-idseq-s3-tar-writer
      - plan-elb-access-logs
      - plan-maintenance
      - plan-heatmap-optimization
      - plan-db
      - plan-downloads
      - plan-ecs
      - plan-batch
      - plan-redis
      - plan-web
      - plan-web-waf
      - plan-auth0
      - plan-resque
      - plan-eks
      - plan-k8s-core
      - plan-happy
      - plan-access-management
    steps:
      - name: Components Summary
        id: summary
        # TODO: route53
        run: |
          echo "|| Component | Changes |" >> $GITHUB_STEP_SUMMARY
          echo "| - | --------- | ------- |" >> $GITHUB_STEP_SUMMARY
          
          if [[ -z "${{ needs.plan-iam-password-policy.outputs.change-count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed | ${{ needs.plan-iam-password-policy.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-iam-password-policy.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | iam-password-policy | None | ${{ needs.plan-iam-password-policy.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | iam-password-policy | ${{ needs.plan-iam-password-policy.outputs.change-count }} | ${{ needs.plan-iam-password-policy.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -z "${{ needs.plan-params-secrets.outputs.change-count }}" ]]; then
            echo "| :red_circle: | params-secrets | Failed | ${{ needs.plan-params-secrets.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-params-secrets.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | params-secrets | None | ${{ needs.plan-params-secrets.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | params-secrets | ${{ needs.plan-params-secrets.outputs.change-count }} | ${{ needs.plan-params-secrets.outputs.artifact-id }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-czid-services-private-key.outputs.change-count }}" ]]; then
            echo "| :red_circle: | czid-services-private-key | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-czid-services-private-key.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | czid-services-private-key | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | czid-services-private-key | ${{ needs.plan-czid-services-private-key.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-cloud-env.outputs.change-count }}" ]]; then
            echo "| :red_circle: | cloud-env | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-cloud-env.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | cloud-env | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | cloud-env | ${{ needs.plan-cloud-env.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-idseq-s3-tar-writer.outputs.change-count }}" ]]; then
            echo "| :red_circle: | idseq-s3-tar-writer | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-idseq-s3-tar-writer.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | idseq-s3-tar-writer | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | idseq-s3-tar-writer | ${{ needs.plan-idseq-s3-tar-writer.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-elb-access-logs.outputs.change-count }}" ]]; then
            echo "| :red_circle: | elb-access-logs | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-elb-access-logs.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | elb-access-logs | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | elb-access-logs | ${{ needs.plan-elb-access-logs.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-maintenance.outputs.change-count }}" ]]; then
            echo "| :red_circle: | maintenance | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-maintenance.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | maintenance | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | maintenance | ${{ needs.plan-maintenance.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-heatmap-optimization.outputs.change-count }}" ]]; then
            echo "| :red_circle: | heatmap-optimization | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-heatmap-optimization.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | heatmap-optimization | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | heatmap-optimization | ${{ needs.plan-heatmap-optimization.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-db.outputs.change-count }}" ]]; then
            echo "| :red_circle: | db | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-db.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | db | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | db | ${{ needs.plan-db.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-downloads.outputs.change-count }}" ]]; then
            echo "| :red_circle: | downloadspolicy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-downloads.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | downloads | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | downloads | ${{ needs.plan-downloads.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-ecs.outputs.change-count }}" ]]; then
            echo "| :red_circle: | ecs | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-ecs.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | ecs | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | ecs | ${{ needs.plan-ecs.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-batch.outputs.change-count }}" ]]; then
            echo "| :red_circle: | batch | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-batch.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | batch | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | batch | ${{ needs.plan-batch.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-redis.outputs.change-count }}" ]]; then
            echo "| :red_circle: | redis | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-redis.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | redis | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | redis | ${{ needs.plan-redis.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi          
          
          if [[ -z "${{ needs.plan-web.outputs.change-count }}" ]]; then
            echo "| :red_circle: | web | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-web.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | web | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | web | ${{ needs.plan-web.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-web-waf.outputs.change-count }}" ]]; then
            echo "| :red_circle: | web-waf | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-web-waf.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | web-waf | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | web-waf | ${{ needs.plan-web-waf.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-auth0.outputs.change-count }}" ]]; then
            echo "| :red_circle: | auth0 | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-auth0.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | auth0 | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | auth0 | ${{ needs.plan-auth0.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-resque.outputs.change-count }}" ]]; then
            echo "| :red_circle: | resque | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-resque.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | resque | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | resque | ${{ needs.plan-resque.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-eks.outputs.change-count }}" ]]; then
            echo "| :red_circle: | eks | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-eks.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | eks | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | eks | ${{ needs.plan-eks.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-k8s-core.outputs.change-count }}" ]]; then
            echo "| :red_circle: | k8s-core | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-k8s-core.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | k8s-core | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | k8s-core | ${{ needs.plan-k8s-core.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-happy.outputs.change-count }}" ]]; then
            echo "| :red_circle: | happypolicy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-happy.outputs.change-count }}" -eq 0 ]]; then
            echo "| :green_circle: | happy | None |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | happy | ${{ needs.plan-happy.outputs.change-count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-access-management.outputs.change-count }}" ]]; then
