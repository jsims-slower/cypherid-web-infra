          fi
          
          if [[ -z "${{ needs.plan-maintenance.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-maintenance.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | maintenance | No Changes |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | maintenance | ${{ needs.plan-maintenance.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-heatmap-optimization.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-heatmap-optimization.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | heatmap-optimization | No Changes |" >> $GITHUB_STEP_SUMMARY 
          else
