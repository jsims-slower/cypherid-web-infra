          fi
          
          if [[ -z "${{ needs.plan-downloads.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-downloads.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | downloads | No Changes |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | downloads | ${{ needs.plan-downloads.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-ecs.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-ecs.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | ecs | No Changes |" >> $GITHUB_STEP_SUMMARY 
          else
            echo "| :yellow_circle: | ecs | ${{ needs.plan-ecs.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ -z "${{ needs.plan-batch.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-batch.outputs.count }}" -eq 0 ]]; then
            echo "| :green_circle: | batch | No Changes |" >> $GITHUB_STEP_SUMMARY 
