          fi
          
          if [[ -z "${{ needs.plan-eks.outputs.count }}" ]]; then
            echo "| :red_circle: | iam-password-policy | Failed |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.plan-eks.outputs.count }}" -eq 0 ]]; then
