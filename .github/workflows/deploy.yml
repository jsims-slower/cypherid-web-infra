name: CypherID Web Infra Deploy
run-name: Deploy CypherID Web Infra to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: environment
        default: 'debug'
#      profile-name:
#        description: 'The profile name to use for AWS CLI'
#        required: true
#        type: string
#        default: 'idseq-dev'

env:
  AWS_REGION: us-west-2
  AWS_DEFAULT_OUTPUT: json
  #DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
  TF_CLI_ARGS_apply: "--auto-approve"


permissions:
  id-token: write
  contents: read

jobs:
  DeployTerraform:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-executor
          #role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity --profile idseq-${{ inputs.environment }}
      - name: iam-password-policy
        run: |
          cd terraform/envs/${{ inputs.environment }}/iam-password-policy/
          make check-plan
      - name: params-secrets
        run: |
          cd terraform/envs/${{ inputs.environment }}/params-secrets/
          make check-plan
      - name: route53
        run: |
          cd terraform/envs/${{ inputs.environment }}/route53/
          make check-plan

