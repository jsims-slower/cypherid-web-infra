name: CypherID Web Infra Deploy
run-name: Deploy CypherID Web Infra to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: environment
        default: 'debug'

env:
  AWS_REGION: us-west-2
  #AWS_DEFAULT_OUTPUT: json
  #DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
  TF_CLI_ARGS_apply: "--auto-approve"


permissions:
  id-token: write
  contents: read

jobs:
  DeployTerraform:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      #max-parallel: 2
      matrix:
        component:
          - iam-password-policy
          - params-secrets
          #- route53
          - czid-services-private-key
          - cloud-env
          #- idseq-s3-tar-writer
          #- elb-access-logs
          - maintenance
          #- heatmap-optimization
          #- db
          #- downloads
          #- ecs
          #- batch
          #- redis
          #- web
          #- web-waf
          #- auth0
          #- resque
          #- eks
          #- k8s-core
          #- happy
          #- access-management
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-executor
          #role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity --profile idseq-${{ inputs.environment }}
      - name: Setup Terraform
        run: |
          make setup
          make terraform
          .fogg/tfenv/bin/tfenv init
          .fogg/tfenv/bin/terraform --version
      - name: "Plan - ${{ matrix.component }}"
        # TODO: Handle special cases, like route53 which needs idseq-prod access; or fix route53 to be profile-specific only; also Auth0 Params
        run: |
          cd terraform/envs/${{ inputs.environment }}/${{ matrix.component }}/
          make refresh
          set +e
          ../../../../.fogg/tfenv/bin/terraform plan -input=false -detailed-exitcode -refresh=false -out=/tmp/${{ matrix.component }}.plan
          exitcode=$?
          echo "Terraform exited with $exitcode"
          if [[ $exitcode -eq 2 ]]; then
            echo "planHasChanges=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            exit $exitcode          
          fi
